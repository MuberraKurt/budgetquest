server.port=8763

#eureka.client.service-url.defaultZone=http://localhost:8761/eureka
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE:http://localhost:8761/eureka}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

spring.cloud.gateway.server.webmvc.routes[0].id=user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/users/**

spring.cloud.gateway.server.webmvc.routes[1].id=transaction-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://transaction-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/transactions/**

